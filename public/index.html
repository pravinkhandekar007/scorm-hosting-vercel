<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SCORM Player Platform</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f8f9fa;
      margin: 0;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    h1 {
      color: #333;
      font-weight: normal;
      margin-bottom: 1rem;
    }
    nav {
      margin-top: 1.5rem;
      text-align: center;
    }
    nav a {
      color: #007bff;
      text-decoration: none;
      margin: 0 0.5rem;
      font-size: 1rem;
    }
    nav a:hover {
      text-decoration: underline;
    }
    p.note {
      margin-top: 0.5rem;
      color: #555;
      font-size: 0.9rem;
    }
    form {
      margin-top: 2rem;
      background: white;
      padding: 1.5rem;
      border-radius: 6px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 320px;
      display: flex;
      flex-direction: column;
    }
    label {
      margin-bottom: 0.3rem;
      color: #222;
      font-weight: 600;
    }
    input[type="text"],
    input[type="password"] {
      padding: 0.5rem;
      margin-bottom: 1rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 1rem;
    }
    button {
      padding: 0.6rem;
      background-color: #007bff;
      border: none;
      color: white;
      border-radius: 4px;
      font-size: 1rem;
      cursor: pointer;
      transition: background-color 0.25s ease;
    }
    button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>
  <h1>Welcome to SCORM Player</h1>

  <nav>
    <a href="upload.html">Upload a SCORM Course</a>
  </nav>
  <p class="note">Use course links shared with you to view courses.</p>

  <form id="loginForm" action="/login" method="POST">
    <label for="username">Username or Email</label>
    <input type="text" id="username" name="username" placeholder="Enter your username or email" required />

    <label for="password">Password</label>
    <input type="password" id="password" name="password" placeholder="Enter your password" required />

    <button type="submit">Login</button>
  </form>
</body>
</html>
