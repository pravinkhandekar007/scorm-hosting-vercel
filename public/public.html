<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src https://<YOUR-SUPABASE-URL>;">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Public Course</title>
  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    // Initialize Supabase client
    const SUPABASE_URL = 'https://mfooewemvofleynanjkb.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1mb29ld2Vtdm9mbGV5bmFuamtiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTkyOTUwMjYsImV4cCI6MjA3NDg3MTAyNn0.EFvtSe-k-SPDCf1-1py6ev7nBLDJFCrNgZ95_c29_ZY';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Extract public_id from URL, e.g., /public.html?public_id=abc123
    const params = new URLSearchParams(window.location.search);
    const public_id = params.get('public_id');
    if (!public_id) {
      document.body.textContent = 'Invalid public link.';
      throw new Error('Missing public_id');
    }

    // Main async flow
    (async () => {
      // 1. Sign in anonymously
      const { error: anonErr } = await supabase.auth.signIn({ provider: 'anonymous' });
      if (anonErr) {
        document.body.textContent = 'Anonymous sign-in failed.';
        console.error(anonErr);
        return;
      }

      // 2. Fetch custom JWT with embedded public_id
      const resp = await fetch('/.netlify/functions/issue-public-jwt', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ public_id }),
      });
      const { access_token, error: jwtErr } = await resp.json();
      if (jwtErr || !access_token) {
        document.body.textContent = 'Failed to obtain public token.';
        console.error(jwtErr);
        return;
      }

      // 3. Set session with new JWT
      await supabase.auth.setSession({ access_token });

      // 4. Query course metadata
      const { data: course, error: courseErr } = await supabase
        .from('courses')
        .select('*')
        .single();
      if (courseErr || !course) {
        document.body.textContent = 'Course not found or access denied.';
        console.error(courseErr);
        return;
      }

      // 5. Render course launch (example: iframe)
      document.body.innerHTML = `
        <h1>${course.title}</h1>
        <iframe src="${course.scorm_url}" width="800" height="600"></iframe>
      `;
    })();
  </script>
</head>
<body>
  <p>Loading course…</p>
</body>
</html>
