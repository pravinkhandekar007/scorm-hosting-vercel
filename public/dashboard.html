<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SCORM Dashboard</title>
  <style>
    /* (Existing styles unchanged) */
    body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background-color: #f7f7f7; }
    .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 2px solid #e9ecef; }
    h1 { color: #2c3e50; margin: 0; }
    .user-info { color: #6c757d; }
    .nav-buttons { display: flex; gap: 15px; margin-bottom: 30px; }
    .btn { background-color: #007bff; color: white; padding: 12px 20px; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; display: inline-block; font-size: 16px; transition: background-color 0.3s; }
    .btn:hover { background-color: #0056b3; }
    .btn-success { background-color: #28a745; }
    .btn-success:hover { background-color: #218838; }
    .btn-secondary { background-color: #6c757d; }
    .btn-secondary:hover { background-color: #5a6268; }
    .btn-danger { background-color: #dc3545; }
    .btn-danger:hover { background-color: #c82333; }
    .courses-section { margin-top: 20px; }
    .course-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; margin-bottom: 10px; background-color: #f8f9fa; border-radius: 5px; border-left: 4px solid #007bff; }
    .course-title { font-weight: bold; color: #2c3e50; }
    .course-actions { display: flex; gap: 10px; align-items: center; }
    .btn-small { padding: 8px 15px; font-size: 14px; }
    #loading { text-align: center; color: #6c757d; }
    .empty-state { text-align: center; padding: 40px; color: #6c757d; }
    /* Public viewer styles */
    #public-viewer { display: none; text-align: center; }
    #pv-loading { margin-top: 50px; color: #6c757d; }
    #pv-error { margin-top: 50px; color: red; display: none; }
    #pv-title { margin-top: 20px; color: #2c3e50; }
    #pv-description { color: #555; }
    #pv-player { width: 100%; height: calc(100vh - 25px); border: none; margin-top: 5px; }
  </style>
</head>
<body>
  <!-- Public Viewer Section -->
  <div id="public-viewer">
    <div id="pv-loading">Loading course…</div>
    <div id="pv-error"></div>
    <h1 id="pv-title"></h1>
    <p id="pv-description"></p>
    <iframe id="pv-player" src="about:blank"></iframe>
  </div>

  <!-- Dashboard Section -->
  <div id="dashboard-ui" class="container">
    <div class="header">
      <h1>🎓 SCORM Dashboard</h1>
      <div class="user-info">
        <span id="user-email">Loading...</span>
        <button class="btn btn-secondary" onclick="logout()" style="margin-left: 15px;">Logout</button>
      </div>
    </div>

    <div class="nav-buttons">
      <a href="upload.html" class="btn btn-success">📤 Upload New Course</a>
      <button class="btn" onclick="refreshCourses()">🔄 Refresh List</button>
    </div>

    <div class="courses-section">
      <h2>My Uploaded Courses</h2>
      <div id="loading">Loading your courses...</div>
      <div id="courses-list"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.6.0/dist/umd/supabase.min.js"></script>
  <script>
    const SUPABASE_URL = 'https://mfooewemvofleynanjkb.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1mb29ld2Vtdm9mbGV5bmFuamtiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTkyOTUwMjYsImV4cCI6MjA3NDg3MTAyNn0.EFvtSe-k-SPDCf1-1py6ev7nBLDJFCrNgZ95_c29_ZY';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    document.addEventListener('DOMContentLoaded', async () => {
      const params = new URLSearchParams(window.location.search);
      const token = params.get('token');

      if (token) {
        // Public mode
        document.getElementById('dashboard-ui').style.display = 'none';
        document.getElementById('public-viewer').style.display = 'block';
        await showPublicCourse(token);
      } else {
        // Dashboard mode
        await checkAuthAndLoadData();
      }
    });

    async function showPublicCourse(token) {
      try {
        // Anonymous sign-in
        await supabase.auth.signIn({ provider: 'anonymous' });

        // Set session to custom JWT with public_id claim
        const resp = await fetch('https://mfooewemvofleynanjkb.supabase.co/functions/v1/issue-public-jwt', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ public_id: token })
        });
        const { access_token, error: jwtErr } = await resp.json();
        if (jwtErr || !access_token) throw new Error(jwtErr || 'No token');

        await supabase.auth.setSession({ access_token });

        // Fetch the course
        const { data: course, error } = await supabase
          .from('courses')
          .select('*')
          .single();
        if (error || !course) throw new Error(error?.message || 'Not found');

        // Render course
        document.getElementById('pv-loading').style.display = 'none';
        document.getElementById('pv-title').textContent = course.title;
        document.getElementById('pv-description').textContent = course.description;
        document.getElementById('pv-player').src = `player.html?course=${encodeURIComponent(course.course_slug)}`;
      } catch (err) {
        document.getElementById('pv-loading').style.display = 'none';
        const el = document.getElementById('pv-error');
        el.textContent = 'Error: ' + err.message;
        el.style.display = 'block';
      }
    }

    async function checkAuthAndLoadData() {
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) return window.location.href = 'login.html';
      document.getElementById('user-email').textContent = session.user.email;
      await loadCourses();
    }

    async function loadCourses() {
      document.getElementById('loading').style.display = 'block';
      const coursesDiv = document.getElementById('courses-list');
      coursesDiv.innerHTML = '';

      const { data: courses, error } = await supabase
        .from('courses')
        .select('course_slug, title, is_public, public_token')
        .order('created_at', { ascending: false });

      document.getElementById('loading').style.display = 'none';
      if (error) return coursesDiv.innerHTML = `<div class="empty-state">Error: ${error.message}</div>`;
      if (!courses.length) {
        return coursesDiv.innerHTML = `
          <div class="empty-state">
            <p>No courses uploaded yet.</p>
            <a href="upload.html" class="btn btn-success">Upload Your First Course</a>
          </div>`;
      }

      coursesDiv.innerHTML = courses.map(course => `
        <div class="course-item">
          <div class="course-title">${course.title}</div>
          <div class="course-actions">
            <a href="player.html?course=${encodeURIComponent(course.course_slug)}"
               target="_blank" class="btn btn-small">▶️ Launch</a>
            <button class="btn btn-secondary btn-small"
                    onclick="copyURL('${course.course_slug}')">🔗 Copy URL</button>
            <button class="btn btn-danger btn-small"
                    onclick="deleteCourse('${course.course_slug}')">🗑️ Delete</button>
            <div style="margin-left:10px;">
              ${course.is_public
                ? `<span style="color:green;">🌐 Public</span>
                   <button class="btn btn-small btn-success"
                           onclick="copyPublicLink('${course.public_token}')">
                     Copy Public Link
                   </button>
                   <button class="btn btn-small btn-danger"
                           onclick="revokePublicAccess('${course.course_slug}')">
                     Revoke Public
                   </button>`
                : `<button class="btn btn-small btn-success"
                           onclick="generatePublicLink('${course.course_slug}')">
                     Make Public
                   </button>`
              }
            </div>
          </div>
        </div>
      `).join('');
    }

    // Copy private launch URL
    function copyURL(slug) {
      const link = `${window.location.origin}/player.html?course=${encodeURIComponent(slug)}`;
      navigator.clipboard.writeText(link).then(() => alert('Course link copied!'));
    }

    // Generate public_token, mark is_public, and refresh list
    async function generatePublicLink(slug) {
      try {
        const newToken = crypto.randomUUID();
        const { error } = await supabase
          .from('courses')
          .update({ is_public: true, public_token: newToken })
          .eq('course_slug', slug);
        if (error) throw error;

        const publicUrl = `${window.location.origin}/public.html?public_id=${newToken}`;
        navigator.clipboard.writeText(publicUrl);
        alert('Public link copied: ' + publicUrl);
        await loadCourses();
      } catch (err) {
        alert('Error: ' + err.message);
      }
    }

    // Copy existing public link
    function copyPublicLink(token) {
      const url = `${window.location.origin}/public.html?public_id=${token}`;
      navigator.clipboard.writeText(url).then(() => alert('Public link copied!'));
    }

    // Revoke public access
    async function revokePublicAccess(slug) {
      if (!confirm('Revoke public access?')) return;
      const { error } = await supabase
        .from('courses')
        .update({ is_public: false })
        .eq('course_slug', slug);
      if (error) return alert('Error: ' + error.message);
      alert('Public access revoked');
      await loadCourses();
    }

    // Delete course
    async function deleteCourse(slug) {
      if (!confirm('Delete this course?')) return;
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) return alert('Login required');
      const res = await fetch(`${SUPABASE_URL}/functions/v1/delete-course?course=${encodeURIComponent(slug)}`, {
        method: 'DELETE',
        headers: { Authorization: `Bearer ${session.access_token}` }
      });
      const result = await res.json();
      if (!res.ok) return alert('Delete failed: ' + (result.error || 'Unknown'));
      alert('Deleted');
      await loadCourses();
    }

    // Logout
    async function logout() {
      await supabase.auth.signOut();
      window.location.href = 'login.html';
    }

    // Refresh list
    window.refreshCourses = loadCourses;
  </script>
</body>
</html>
