<!DOCTYPE html>
<html lang="en">
<head>
  <!-- (Head content omitted for brevity; keep as before) -->
</head>
<body>
  <!-- Public viewer and dashboard UI unchanged ... -->

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.6.0/dist/umd/supabase.min.js"></script>
  <script>
    const SUPABASE_URL = 'https://mfooewemvofleynanjkb.supabase.co';
    const SUPABASE_ANON_KEY = 'your-anon-key';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    document.addEventListener('DOMContentLoaded', async () => {
      const params = new URLSearchParams(window.location.search);
      const publicToken = params.get('public_token');

      if (publicToken) {
        // Public mode
        document.getElementById('dashboard-ui').style.display = 'none';
        document.getElementById('public-viewer').style.display = 'block';
        await showPublicCourse(publicToken);
      } else {
        // Dashboard mode
        await checkAuthAndLoadData();
      }
    });

    async function showPublicCourse(publicToken) {
      try {
        // Fetch Edge Function JWT using public_token
        const resp = await fetch(`${SUPABASE_URL}/functions/v1/issue-public-jwt`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ public_id: publicToken }), // Keep 'public_id' here if your function expects this key
        });
        if (!resp.ok) throw new Error('Failed to get access token');
        const { access_token, error: jwtErr } = await resp.json();
        if (jwtErr || !access_token) throw new Error(jwtErr || 'No token');

        await supabase.auth.setSession({ access_token });

        const { data: course, error } = await supabase
          .from('courses')
          .select('*')
          .single();
        if (error || !course) throw new Error(error?.message || 'Not found');

        document.getElementById('pv-loading').style.display = 'none';
        document.getElementById('pv-title').textContent = course.title;
        document.getElementById('pv-description').textContent = course.description;
        document.getElementById('pv-player').src = `player.html?course=${encodeURIComponent(course.course_slug)}`;
      } catch (err) {
        document.getElementById('pv-loading').style.display = 'none';
        const el = document.getElementById('pv-error');
        el.textContent = 'Error: ' + err.message;
        el.style.display = 'block';
      }
    }

    async function checkAuthAndLoadData() {
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) return window.location.href = 'login.html';
      document.getElementById('user-email').textContent = session.user.email;
      await loadCourses();
    }

    async function loadCourses() {
      document.getElementById('loading').style.display = 'block';
      const coursesDiv = document.getElementById('courses-list');
      coursesDiv.innerHTML = '';

      const { data: courses, error } = await supabase
        .from('courses')
        .select('course_slug, title, is_public, public_token')
        .order('created_at', { ascending: false });

      document.getElementById('loading').style.display = 'none';
      if (error) {
        coursesDiv.innerHTML = `<div class="empty-state">Error: ${error.message}</div>`;
        return;
      }
      if (!courses.length) {
        coursesDiv.innerHTML = `
          <div class="empty-state">
            <p>No courses uploaded yet.</p>
            <a href="upload.html" class="btn btn-success">Upload Your First Course</a>
          </div>`;
        return;
      }

      coursesDiv.innerHTML = courses.map(course => `
        <div class="course-item">
          <div class="course-title">${course.title}</div>
          <div class="course-actions">
            <a href="player.html?course=${encodeURIComponent(course.course_slug)}"
               target="_blank" class="btn btn-small">▶️ Launch</a>
            <button class="btn btn-secondary btn-small"
                    onclick="copyURL('${course.course_slug}')">🔗 Copy URL</button>
            <button class="btn btn-danger btn-small"
                    onclick="deleteCourse('${course.course_slug}')">🗑️ Delete</button>
            <div style="margin-left:10px;">
              ${course.is_public
                ? `<span style="color:green;">🌐 Public</span>
                   <button class="btn btn-small btn-success"
                           onclick="copyPublicLink('${course.public_token}')">
                     Copy Public Link
                   </button>
                   <button class="btn btn-small btn-danger"
                           onclick="revokePublicAccess('${course.course_slug}')">
                     Revoke Public
                   </button>`
                : `<button class="btn btn-small btn-success"
                           onclick="generatePublicLink('${course.course_slug}')">
                     Make Public
                   </button>`
              }
            </div>
          </div>
        </div>
      `).join('');
    }

    function copyURL(slug) {
      const link = `${window.location.origin}/player.html?course=${encodeURIComponent(slug)}`;
      navigator.clipboard.writeText(link).then(() => alert('Course link copied!'));
    }

    async function generatePublicLink(slug) {
      try {
        const newToken = crypto.randomUUID();
        const { error } = await supabase
          .from('courses')
          .update({ is_public: true, public_token: newToken })
          .eq('course_slug', slug);
        if (error) throw error;

        const publicUrl = `${window.location.origin}/public.html?public_token=${newToken}`;
        navigator.clipboard.writeText(publicUrl);
        alert('Public link copied: ' + publicUrl);
        await loadCourses();
      } catch (err) {
        alert('Error: ' + err.message);
      }
    }

    function copyPublicLink(token) {
      const url = `${window.location.origin}/public.html?public_token=${token}`;
      navigator.clipboard.writeText(url).then(() => alert('Public link copied!'));
    }

    async function revokePublicAccess(slug) {
      if (!confirm('Revoke public access?')) return;
      const { error } = await supabase
        .from('courses')
        .update({ is_public: false, public_token: null })
        .eq('course_slug', slug);
      if (error) {
        alert('Error: ' + error.message);
        return;
      }
      alert('Public access revoked');
      await loadCourses();
    }

    async function deleteCourse(slug) {
      if (!confirm("Are you sure you want to delete this course?")) return;
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) {
        alert("Login required to delete courses.");
        return;
      }
      try {
        const response = await fetch(`${SUPABASE_URL}/functions/v1/delete-course?course=${encodeURIComponent(slug)}`, {
          method: "DELETE",
          headers: {
            Authorization: `Bearer ${session.access_token}`
          }
        });
        const result = await response.json();
        if (!response.ok) {
          alert(`Delete failed: ${result.error || "Unknown error"}`);
          return;
        }
        alert("Course deleted successfully.");
        await loadCourses();
      } catch (error) {
        alert("Delete error: " + error.message);
      }
    }

    async function logout() {
      await supabase.auth.signOut();
      window.location.href = "login.html";
    }

    window.refreshCourses = loadCourses;
  </script>
</body>
</html>
