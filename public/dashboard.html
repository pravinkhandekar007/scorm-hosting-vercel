<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SCORM Dashboard</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background-color: #f7f7f7; }
    .container { max-width: 1200px; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 2px solid #e9ecef; }
    h1 { color: #2c3e50; margin: 0; }
    .user-info { color: #6c757d; display: flex; align-items: center; gap: 15px; }
    .nav-buttons { display: flex; gap: 15px; margin-bottom: 30px; }
    .btn { background-color: #007bff; color: white; padding: 12px 20px; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; display: inline-block; font-size: 16px; transition: background-color 0.3s; }
    .btn:hover { background-color: #0056b3; }
    .btn-success { background-color: #28a745; }
    .btn-success:hover { background-color: #218838; }
    .btn-secondary { background-color: #6c757d; }
    .btn-secondary:hover { background-color: #5a6268; }
    .btn-danger { background-color: #dc3545; }
    .btn-danger:hover { background-color: #c82333; }
    .courses-section { margin-top: 20px; }
    .course-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; margin-bottom: 10px; background-color: #f8f9fa; border-radius: 5px; border-left: 4px solid #007bff; }
    .course-item.public { border-left-color: #28a745; }
    .course-title { font-weight: bold; color: #2c3e50; flex: 1; }
    .course-actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .btn-small { padding: 8px 15px; font-size: 14px; }
    .status-badge { padding: 5px 12px; border-radius: 20px; font-size: 13px; font-weight: bold; display: inline-flex; align-items: center; gap: 5px; }
    .status-public { background-color: #d4edda; color: #155724; }
    .status-private { background-color: #e2e3e5; color: #383d41; }
    #loading { text-align: center; color: #6c757d; padding: 40px; }
    .empty-state { text-align: center; padding: 60px 20px; color: #6c757d; }
    .empty-state-icon { font-size: 64px; margin-bottom: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🎓 SCORM Dashboard</h1>
      <div class="user-info">
        <span id="user-email">Loading...</span>
        <button class="btn btn-secondary" onclick="logout()">Logout</button>
      </div>
    </div>

    <div class="nav-buttons">
      <a href="upload.html" class="btn btn-success">📤 Upload New Course</a>
      <button class="btn" onclick="refreshCourses()">🔄 Refresh List</button>
    </div>

    <div class="courses-section">
      <h2>My Uploaded Courses</h2>
      <div id="loading">Loading your courses...</div>
      <div id="courses-list"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.6.0/dist/umd/supabase.min.js"></script>
  <script>
    const SUPABASE_URL = 'https://mfooewemvofleynanjkb.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1mb29ld2Vtdm9mbGV5bmFuamtiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTkyOTUwMjYsImV4cCI6MjA3NDg3MTAyNn0.EFvtSe-k-SPDCf1-1py6ev7nBLDJFCrNgZ95_c29_ZY';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    document.addEventListener('DOMContentLoaded', async () => {
      await checkAuthAndLoadData();
    });

    async function checkAuthAndLoadData() {
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) {
        window.location.href = 'login.html';
        return;
      }
      document.getElementById('user-email').textContent = session.user.email;
      await loadCourses();
    }

    async function loadCourses() {
      document.getElementById('loading').style.display = 'block';
      const coursesDiv = document.getElementById('courses-list');
      coursesDiv.innerHTML = '';

      const { data: courses, error } = await supabase
        .from('courses')
        .select('course_slug, title, is_public, public_token, created_at')
        .order('created_at', { ascending: false });

      document.getElementById('loading').style.display = 'none';

      if (error) {
        coursesDiv.innerHTML = `<div class="empty-state">
          <div class="empty-state-icon">⚠️</div>
          <p>Error loading courses: ${error.message}</p>
        </div>`;
        return;
      }

      if (!courses || courses.length === 0) {
        coursesDiv.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">📚</div>
            <p>No courses uploaded yet.</p>
            <a href="upload.html" class="btn btn-success">Upload Your First Course</a>
          </div>`;
        return;
      }

      coursesDiv.innerHTML = courses.map(course => `
        <div class="course-item ${course.is_public ? 'public' : ''}">
          <div class="course-title">${course.title}</div>
          <div class="course-actions">
            <span class="status-badge ${course.is_public ? 'status-public' : 'status-private'}">
              ${course.is_public ? '🌐 Public' : '🔒 Private'}
            </span>
            <a href="player.html?course=${encodeURIComponent(course.course_slug)}"
               target="_blank" class="btn btn-small">▶️ Launch</a>
            <button class="btn btn-secondary btn-small"
                    onclick="copyPrivateURL('${course.course_slug}')">🔗 Copy Private URL</button>
            ${course.is_public && course.public_token
              ? `<button class="btn btn-success btn-small"
                         onclick="copyPublicLink('${course.public_token}')">
                   📋 Copy Public Link
                 </button>`
              : ''
            }
            <button class="btn btn-danger btn-small"
                    onclick="deleteCourse('${course.course_slug}')">🗑️ Delete</button>
          </div>
        </div>
      `).join('');
    }

    function copyPrivateURL(slug) {
      const url = `${window.location.origin}/player.html?course=${encodeURIComponent(slug)}`;
      navigator.clipboard.writeText(url).then(() => {
        alert('✅ Private course URL copied to clipboard!\n\nThis link requires login to access.');
      });
    }

    function copyPublicLink(token) {
      const url = `${window.location.origin}/public.html?public_token=${token}`;
      navigator.clipboard.writeText(url).then(() => {
        alert('✅ Public link copied to clipboard!\n\nThis link can be accessed by anyone without login.');
      });
    }

    async function deleteCourse(slug) {
      if (!confirm('⚠️ Are you sure you want to delete this course?\n\nThis action cannot be undone.')) return;
      
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) {
        alert('❌ Login required to delete courses.');
        return;
      }

      try {
        const response = await fetch(`${SUPABASE_URL}/functions/v1/delete-course?course=${encodeURIComponent(slug)}`, {
          method: 'DELETE',
          headers: {
            Authorization: `Bearer ${session.access_token}`
          }
        });
        
        const result = await response.json();
        
        if (!response.ok) {
          throw new Error(result.error || 'Unknown error');
        }
        
        alert('✅ Course deleted successfully.');
        await loadCourses();
      } catch (error) {
        alert(`❌ Delete failed: ${error.message}`);
      }
    }

    async function logout() {
      await supabase.auth.signOut();
      window.location.href = 'login.html';
    }

    window.refreshCourses = loadCourses;
  </script>
</body>
</html>
