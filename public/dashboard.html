<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>SCORM Dashboard</title>
<style>
  /* Your existing CSS styles */
  body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background-color: #f7f7f7; }
  .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 2px solid #e9ecef; }
  h1 { color: #2c3e50; margin: 0; }
  .user-info { color: #6c757d; }
  .nav-buttons { display: flex; gap: 15px; margin-bottom: 30px; }
  .btn { background-color: #007bff; color: white; padding: 12px 20px; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; display: inline-block; font-size: 16px; transition: background-color 0.3s; }
  .btn:hover { background-color: #0056b3; }
  .btn-success { background-color: #28a745; }
  .btn-success:hover { background-color: #218838; }
  .btn-secondary { background-color: #6c757d; }
  .btn-secondary:hover { background-color: #5a6268; }
  .btn-danger { background-color: #dc3545; }
  .btn-danger:hover { background-color: #c82333; }
  .courses-section { margin-top: 20px; }
  .course-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; margin-bottom: 10px; background-color: #f8f9fa; border-radius: 5px; border-left: 4px solid #007bff; }
  .course-title { font-weight: bold; color: #2c3e50; }
  .course-actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .btn-small { padding: 8px 15px; font-size: 14px; }
  #loading { text-align: center; color: #6c757d; }
  .empty-state { text-align: center; padding: 40px; color: #6c757d; }
</style>
</head>
<body>
<!-- Viewer for public courses -->
<div id="public-viewer" style="display:none; text-align:center;">
  <div id="pv-loading">Loading course...</div>
  <div id="pv-error"></div>
  <h1 id="pv-title"></h1>
  <p id="pv-description"></p>
  <iframe id="pv-player" src="about:blank"></iframe>
</div>

<!-- Main dashboard UI -->
<div id="dashboard-ui" class="container">
  <div class="header">
    <h1>🎓 SCORM Dashboard</h1>
    <div class="user-info">
      <span id="user-email">Loading...</span>
      <button class="btn btn-secondary" onclick="logout()" style="margin-left:15px;">Log Out</button>
    </div>
  </div>
  <div class="nav-buttons">
    <a href="upload.html" class="btn btn-success">📤 Upload New Course</a>
    <button class="btn" onclick="refreshCourses()">🔄 Refresh List</button>
  </div>
  <div class="courses-section">
    <h2>My Uploaded Courses</h2>
    <div id="loading">Loading your courses...</div>
    <div id="courses-list"></div>
  </div>
</div>

<!-- Scripts -->

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

document.addEventListener('DOMContentLoaded', async () => {
  const params = new URLSearchParams(window.location.search);
  const publicToken = params.get('public_token');

  if (publicToken) {
    // Show public course
    document.getElementById('dashboard-ui').style.display='none';
    document.getElementById('public-viewer').style.display='block';
    await showPublicCourse(publicToken);
  } else {
    await checkAuthAndLoadData();
  }
});

// Show course from public link
async function showPublicCourse(publicToken) {
  try {
    // Fetch token from Edge Function
    const res = await fetch(`https://mfooewemvofleynanjkb.supabase.co/functions/v1/issue-public-jwt`,{
      method:'POST',
      headers: { 'Content-Type':'application/json' },
      body: JSON.stringify({ public_id: publicToken })
    });
    if (!res.ok) throw new Error('Failed to fetch token');
    const { access_token, error }= await res.json();
    if (error || !access_token) throw new Error(error || 'No token');
    await supabase.auth.setSession({ access_token });
    // Fetch course data
    const { data: course }= await supabase
      .from('courses')
      .select('*')
      .single();
    if (!course) throw new Error('Course not found');
    // Render course
    document.getElementById('pv-loading').style.display='none';
    document.getElementById('pv-title').textContent=course.title;
    document.getElementById('pv-description').textContent=course.description;
    document.getElementById('pv-player').src=`player.html?course=${encodeURIComponent(course.course_slug)}`;
  } catch (err) {
    document.getElementById('pv-loading').style.display='none';
    document.getElementById('pv-error').textContent='Error: '+err.message;
    document.getElementById('pv-error').style.display='block';
  }
}

// Check auth for dashboard
async function checkAuthAndLoadData() {
  const { data: { session } }= await supabase.auth.getSession();
  if (!session) { window.location.href='login.html'; return; }
  document.getElementById('user-email').textContent=session.user.email;
  await loadCourses();
}
