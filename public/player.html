<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SCORM Course Player</title>
  <style>
    body { margin: 0; padding: 20px; font-family: Arial, sans-serif; background: #f4f4f4; }
    #container { max-width: 1200px; margin: 20px auto; background: #fff; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    #course-title { margin: 0; padding: 20px; background: #2c3e50; color: #fff; font-size: 1.5em; }
    #message { padding: 20px; text-align: center; }
    iframe { width: 100%; height: 80vh; border: none; display: none; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.6.0/dist/umd/supabase.min.js"></script>
</head>
<body>
  <div id="container">
    <h2 id="course-title">Loading…</h2>
    <div id="message">Loading…</div>
    <iframe id="courseFrame" allowfullscreen sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
  </div>

  <script>
    (async () => {
      const SUPABASE_URL = 'https://mfooewemvofleynanjkb.supabase.co';
      const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1mb29ld2Vtdm9mbGV5bmFuamtiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTkyOTUwMjYsImV4cCI6MjA3NDg3MTAyNn0.EFvtSe-k-SPDCf1-1py6ev7nBLDJFCrNgZ95_c29_ZY';
      const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      const titleElem = document.getElementById('course-title');
      const msgElem   = document.getElementById('message');
      const frame     = document.getElementById('courseFrame');
      const params    = new URLSearchParams(window.location.search);
      const courseSlug = params.get('course');

      if (!courseSlug) {
        titleElem.textContent = 'Error';
        msgElem.textContent   = 'Error: Missing course slug.';
        return;
      }

      msgElem.textContent = 'Fetching course metadata…';

      try {
        // Check if user is authenticated
        const { data: { session } } = await supabase.auth.getSession();
        
        // Prepare headers
        const headers = {
          'Content-Type': 'application/json'
        };
        
        // Add auth header if user is logged in
        if (session?.access_token) {
          headers['Authorization'] = `Bearer ${session.access_token}`;
        }

        // Fetch course metadata via edge function
        const res = await fetch(
          `https://mfooewemvofleynanjkb.functions.supabase.co/get-course?slug=${encodeURIComponent(courseSlug)}`,
          { headers }
        );

        if (!res.ok) {
          const errorData = await res.json().catch(() => ({ error: 'Unknown error' }));
          throw new Error(errorData.error || `HTTP ${res.status}`);
        }

        const course = await res.json();
        titleElem.textContent = course.title || 'Untitled Course';
        msgElem.textContent   = 'Generating access URLs…';

        // Generate signed URL for imsmanifest.xml
        const manifestPath = `${courseSlug}/imsmanifest.xml`;
        const { data: manifestData, error: manifestErr } = await supabase
          .storage
          .from('scorm-courses')
          .createSignedUrl(manifestPath, 3600);
        if (manifestErr) throw manifestErr;

        msgElem.textContent = 'Fetching manifest…';
        const mfRes = await fetch(manifestData.signedUrl);
        if (!mfRes.ok) throw new Error(`HTTP ${mfRes.status}`);
        const manifestText = await mfRes.text();

        msgElem.textContent = 'Parsing manifest…';

        // Determine launch file
        let launchFile = course.launch_url || 'index.html';
        try {
          const xml = new DOMParser().parseFromString(manifestText, 'application/xml');
          const resource = xml.querySelector('resource[href]');
          if (resource) launchFile = resource.getAttribute('href');
        } catch {
          // fallback to default
        }

        msgElem.textContent = 'Generating launch URL…';
        const launchPath = `${courseSlug}/${launchFile}`;
        const { data: launchData, error: launchErr } = await supabase
          .storage
          .from('scorm-courses')
          .createSignedUrl(launchPath, 3600);
        if (launchErr) throw launchErr;

        msgElem.textContent = 'Launching course…';
        frame.src = launchData.signedUrl;
        frame.style.display = 'block';
        msgElem.style.display = 'none';

      } catch (err) {
        console.error(err);
        titleElem.textContent = 'Error';
        msgElem.textContent   = `Failed to load course: ${err.message}`;
        frame.style.display   = 'none';
      }
    })();
  </script>
</body>
</html>
