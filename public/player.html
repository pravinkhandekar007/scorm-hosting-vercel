<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Public SCORM Course Player</title>
  <style>
    body { margin: 0; padding: 20px; font-family: Arial, sans-serif; background: #f4f4f4; }
    #container { max-width: 1200px; margin: 20px auto; background: #fff; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    #course-title { margin: 0; padding: 20px; background: #2c3e50; color: #fff; font-size: 1.5em; }
    #message { padding: 20px; text-align: center; color: #333; }
    iframe { width: 100%; height: 80vh; border: none; display: none; }
  </style>
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net;
    connect-src 'self' https://mfooewemvofleynanjkb.supabase.co;
    style-src 'self' 'unsafe-inline';
    frame-src 'self' https://mfooewemvofleynanjkb.supabase.co;
  ">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.57.4/dist/umd/supabase.min.js"></script>
</head>
<body>
  <div id="container">
    <h2 id="course-title">Loading…</h2>
    <div id="message">Loading…</div>
    <iframe id="courseFrame" allowfullscreen sandbox="allow-scripts allow-forms"></iframe>
  </div>

  <script>
    (async () => {
      const SUPABASE_URL = 'https://mfooewemvofleynanjkb.supabase.co';
      const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1mb29ld2Vtdm9mbGV5bmFuamtiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTkyOTUwMjYsImV4cCI6MjA3NDg3MTAyNn0.EFvtSe-k-SPDCf1-1py6ev7nBLDJFCrNgZ95_c29_ZY';
      const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      const msg = document.getElementById('message');
      const frame = document.getElementById('courseFrame');
      const titleElem = document.getElementById('course-title');
      const params = new URLSearchParams(window.location.search);
      const publicId = params.get('public_id');

      if (!publicId) {
        titleElem.textContent = 'Error';
        msg.textContent = 'Missing public_id in URL.';
        return;
      }

      try {
        msg.textContent = 'Fetching access token…';
        const res = await fetch('/.netlify/functions/issue-public-jwt', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ public_id: publicId }),
        });
        if (!res.ok) throw new Error('Failed to get access token');
        const { access_token, error: tokenError } = await res.json();
        if (tokenError || !access_token) throw new Error(tokenError || 'No token returned');

        await supabase.auth.setSession({ access_token });

        msg.textContent = 'Loading course metadata…';
        const { data: course, error: courseErr } = await supabase
          .from('courses')
          .select('*')
          .single();
        if (courseErr || !course) throw courseErr || new Error('Course not found');

        titleElem.textContent = course.title || 'Untitled Course';

        const proxyBaseUrl = `/scorm-content/${course.package_path}/`;

        msg.textContent = 'Fetching manifest…';
        const mfResponse = await fetch(proxyBaseUrl + 'imsmanifest.xml');
        if (!mfResponse.ok) throw new Error(`Failed to fetch manifest: HTTP ${mfResponse.status}`);

        const manifestText = await mfResponse.text();

        msg.textContent = 'Parsing manifest…';
        let launchFile = course.launch_url || 'index.html';
        try {
          const xml = new DOMParser().parseFromString(manifestText, 'application/xml');
          const resource = xml.querySelector('resource[href]');
          if (resource) launchFile = resource.getAttribute('href');
        } catch {
          // fallback silently
        }

        msg.textContent = 'Launching course…';
        frame.src = proxyBaseUrl + launchFile;
        frame.style.display = 'block';
        msg.style.display = 'none';

      } catch (err) {
        console.error(err);
        titleElem.textContent = 'Error';
        msg.textContent = `Failed to load course: ${err.message}`;
        frame.style.display = 'none';
      }
    })();
  </script>
</body>
</html>
