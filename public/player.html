<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>SCORM Player</title>
  <style>
    body { margin:0; font-family:Arial,sans-serif; background:#f4f4f4; }
    #header { background:#2c3e50; color:#fff; padding:10px 20px; display:flex; align-items:center; }
    #title { flex:1; font-size:1.2em; }
    #loader, #error { padding:20px; text-align:center; }
    #loader { color:#555; }
    #error { color:red; }
    iframe { width:100%; height:calc(100vh - 52px); border:none; }
  </style>
</head>
<body>
  <div id="header"><div id="title">Loading SCORM Course…</div></div>
  <div id="loader">Please wait…</div>
  <div id="error" style="display:none;"></div>
  <iframe id="playerFrame" sandbox="allow-scripts allow-same-origin allow-forms" style="display:none;"></iframe>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://mfooewemvofleynanjkb.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1mb29ld2Vtdm9mbGV5bmFuamtiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTkyOTUwMjYsImV4cCI6MjA3NDg3MTAyNn0.EFvtSe-k-SPDCf1-1py6ev7nBLDJFCrNgZ95_c29_ZY';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const PRIVATE_PROXY = '/scorm-content';       // your existing proxy route
    const BUCKET = 'scorm-courses';              // your single bucket name

    (async()=>{
      const titleElem = document.getElementById('title');
      const loader = document.getElementById('loader');
      const errorDiv = document.getElementById('error');
      const iframe = document.getElementById('playerFrame');
      const params = new URLSearchParams(window.location.search);
      const slug = params.get('course');
      const publicToken = params.get('public_token');

      if(!slug){
        errorDiv.textContent='Error: Missing course identifier.'; errorDiv.style.display='block'; loader.style.display='none'; return;
      }

      try{
        // Fetch course metadata
        let query = supabase.from('courses').select('*').limit(1);
        if(publicToken){
          query = query.eq('public_token',publicToken).eq('is_public',true);
        } else {
          query = query.eq('course_slug',slug);
        }
        const { data:[course], error:metaErr } = await query;
        if(metaErr || !course) throw new Error(metaErr?.message||'Course not found');

        titleElem.textContent = course.title||'Untitled Course';

        // Build base URL
        const baseUrl = publicToken
          ? `${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${course.package_path}/`
          : `${PRIVATE_PROXY}/${course.package_path}/`;

        // Load manifest
        loader.textContent='Loading manifest…';
        const mfRes = await fetch(baseUrl + 'imsmanifest.xml');
        if(!mfRes.ok) throw new Error(`HTTP ${mfRes.status}`);
        const manifestText = await mfRes.text();
        const xml = new DOMParser().parseFromString(manifestText,'application/xml');
        const resEl = xml.querySelector('resource[href]');
        const launchFile = resEl?.getAttribute('href')||'index.html';

        // Launch
        loader.style.display='none';
        iframe.src = baseUrl + launchFile;
        iframe.style.display='block';
      }catch(err){
        loader.style.display='none';
        errorDiv.textContent = 'Failed to load course: '+err.message;
        errorDiv.style.display='block';
      }
    })();
  </script>
</body>
</html>
